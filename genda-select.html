<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gender Selection</title>
    <link rel="stylesheet" href="genda-select.css">
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span>16:04</span>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>
        
        <a href="#" class="back-btn">Back</a>
        
        <h2>What's Your Gender</h2>
        
        <div class="gender-options">
            <div class="gender male" onclick="selectGender('male')">
                <div class="icon">♂</div>
                <p>Male</p>
            </div>
            
            <div class="gender female" onclick="selectGender('female')">
                <div class="icon">♀</div>
                <p>Female</p>
            </div>
        </div>
        
        <button class="continue-btn" onclick="saveGender()">Continue</button>
    </div>

    <script>
        let selectedGender = null;

        function selectGender(gender) {
            selectedGender = gender;
            // Remove selected class from all options
            document.querySelectorAll('.gender').forEach(option => {
                option.classList.remove('selected');
            });
            // Add selected class to clicked option
            event.currentTarget.classList.add('selected');
        }

        async function saveGender() {
            if (!selectedGender) {
                alert('Please select a gender');
                return;
            }

            try {
                const response = await fetch('/api/save-gender', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ gender: selectedGender })
                });

                const data = await response.json();
                
                if (data.success) {
                    window.location.href = 'age.html';
                } else {
                    alert('Error saving gender: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving gender. Please try again.');
            }
        }
    </script>
</body>
</html>
