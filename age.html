<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Selection</title>
    <link rel="stylesheet" href="age.css">
</head>
<body>
    <div class="container">
        <div class="status-bar">
            <span>16:04</span>
            <div class="status-icons">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <a href="#" class="back-btn">Back</a>
        
        <h2>How Old Are You?</h2>
        
        <div class="age-display">28</div>
        <div class="arrow"></div>

        <div class="age-selector">
            <div class="age" onclick="selectAge(26)">26</div>
            <div class="age" onclick="selectAge(27)">27</div>
            <div class="age selected" onclick="selectAge(28)">28</div>
            <div class="age" onclick="selectAge(29)">29</div>
            <div class="age" onclick="selectAge(30)">30</div>
        </div>
        
        <button class="continue-btn" onclick="saveAge()">Continue</button>
    </div>

    <script>
        let selectedAge = 28;

        function selectAge(age) {
            selectedAge = age;
            // Update display
            document.querySelector('.age-display').textContent = age;
            // Remove selected class from all options
            document.querySelectorAll('.age').forEach(option => {
                option.classList.remove('selected');
            });
            // Add selected class to clicked option
            event.currentTarget.classList.add('selected');
        }

        async function saveAge() {
            try {
                const response = await fetch('/api/save-age', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ age: selectedAge })
                });

                const data = await response.json();
                
                if (data.success) {
                    window.location.href = 'next-page.html'; // Replace with your next page
                } else {
                    alert('Error saving age: ' + data.message);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error saving age. Please try again.');
            }
        }
    </script>
</body>
</html>
